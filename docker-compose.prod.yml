# Production compose for the air-gapped intranet (RHEL 9.4 + podman-compose).
#
# Usage on the server:
#   1) Load the three pre-built images:
#        podman load -i postgres.tar
#        podman load -i backend.tar
#        podman load -i frontend.tar
#   2) Place this file + .env in the working directory.
#   3) podman-compose up -d
#
# `build:` sections are intentionally absent — the server has no source.
# Backend's CMD runs `prisma migrate deploy && prisma db seed && node ...`,
# so schema migration and base data (users, branches, categories, presets)
# are applied automatically on every container start. Both are idempotent
# (deploy = additive only, seed = upsert), so re-deploys do not touch
# existing user data.

services:
  postgres:
    image: postgres:15-alpine
    container_name: ict-twin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ict_digital_twin}
    # No external ports — only the backend container talks to postgres
    # over the compose-internal network. Uncomment if you need psql from
    # the host: ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: digital-backend:latest
    container_name: ict-twin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-ict_digital_twin}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
    # No external port — frontend's nginx proxies /api and /uploads
    # over the compose network. Uncomment to expose for debugging:
    # ports: ["3000:3000"]
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: digital-frontend:latest
    container_name: ict-twin-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
