# Map for the WebSocket upgrade pattern. Without this, hardcoding
# `Connection: upgrade` on every proxied request leaves the upstream
# connection in a half-state for plain HTTP (no actual upgrade target),
# which on rootless podman + slirp4netns slowly accumulates connections
# in the userspace network proxy and starves the host CPU. With the
# map, regular HTTP requests cleanly send `Connection: close` and only
# real WebSocket upgrades carry `Connection: upgrade`.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Increase buffer size for large headers/cookies
    large_client_header_buffers 4 32k;
    client_header_buffer_size 32k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # MUST stay >= the backend express.json limit (backend/src/index.ts,
    # currently 20mb). Dev has no nginx, so a proxy limit below the backend
    # limit silently rejects large DWG plan PUTs in prod only. Keep headroom.
    client_max_body_size 50m;

    # API proxy
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Uploads proxy (^~ to prioritize over regex)
    location ^~ /uploads {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
